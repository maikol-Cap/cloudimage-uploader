schema: spec-driven

context: |
  Project: cloudimage-uploader — Obsidian plugin for ImgBB image upload
  Subproject: pomodoro-timer — Obsidian plugin for Pomodoro timer with terminal/CLI aesthetic
  Language: TypeScript 5.4
  Runtime: Node.js 18+
  Bundler: esbuild 0.24
  Platform: Obsidian plugin SDK 1.7
  Architecture: Modal/Service pattern (UploadModal → ImgBBClient + EditorService); TimerEngine-ItemView pattern (TimerEngine owned by Plugin, PomodoroView subscribes)
  Testing: none detected — no test runner configured
  Version control: git (main branch)

strict_tdd: false
test_command: ""
build_command: "npm run build"

testing:
  runner: null
  runner_command: ""
  unit: false
  integration: false
  e2e: false
  coverage: false
  coverage_command: ""
  linter: false
  linter_command: ""
  type_checker: true
  type_checker_command: "tsc --noEmit"
  formatter: false
  formatter_command: ""

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
