schema: spec-driven

context: |
  Project: newproyect — Obsidian plugin
  Language: TypeScript 5.x
  Runtime: Node.js 18+
  Bundler: esbuild
  Platform: Obsidian plugin SDK
  Architecture: TBD (greenfield)
  Testing: none detected — no test runner configured
  Version control: not initialized

strict_tdd: false
test_command: ""
build_command: ""

testing:
  runner: null
  runner_command: ""
  unit: false
  integration: false
  e2e: false
  coverage: false
  coverage_command: ""
  linter: false
  linter_command: ""
  type_checker: false
  type_checker_command: ""
  formatter: false
  formatter_command: ""

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
